# This workflow runs on any push to the 'main' branch
name: Deploy to EC2
on:
  push:
    branches: [ "main" ]

# --- IMPORTANT ---
# Set the AWS region, ECR repo name, and your EC2 instance ID
env:
  AWS_REGION: us-east-1                  # Change this to your region (e.g., ap-south-1)
  ECR_REPOSITORY: sentiment-analyzer      # Your ECR repo name
  EC2_INSTANCE_ID: i-0bde85f093ea62827        # Change this to your EC2 Instance ID

# Permissions for the OIDC connector (no secret keys!)
permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build, Push to ECR, and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        # Paste the ARN of the 'github-actions-role' you created
        role-to-assume: arn:aws:iam::857194222592:role/github-actions-role
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2
      id: login-ecr

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        # Use the ECR registry URI from the 'login-ecr' step
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }} # Use the commit hash as a unique tag
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Deploy to EC2
      run: |
        # This sends the command to your EC2 instance
        aws ssm send-command \
          --instance-ids ${{ env.EC2_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "#!/bin/bash",
            "# Log in to ECR (requires the EC2 IAM role)",
            "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}",
            
            "# Stop and remove the old container, if it exists",
            "docker stop sentiment-app || true",
            "docker rm sentiment-app || true",
            
            "# Pull the new image",
            "docker pull ${{ steps.build-image.outputs.image }}",
            
            "# Run the new container",
            "docker run -d --name sentiment-app -p 5000:5000 --restart always ${{ steps.build-image.outputs.image }}"
          ]'